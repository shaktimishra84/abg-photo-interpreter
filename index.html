<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ABG Interpreter</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Rule-based clinical calculator</p>
          <h1>ABG Interpreter</h1>
        </div>
        <div class="topbar-actions">
          <button class="ghost-button" id="loadExample" type="button" title="Load a mixed acidosis example">Example</button>
          <button class="ghost-button" id="resetForm" type="button" title="Clear all values">Reset</button>
          <button class="primary-button" id="runAnalysis" type="button">Analyze</button>
        </div>
      </header>

      <main class="workbench">
        <section class="input-panel" aria-label="ABG inputs">
          <div class="panel-head">
            <div>
              <h2>Patient Data</h2>
              <p>Enter raw values and units exactly as reported.</p>
            </div>
            <span class="status-pill" id="completionStatus">0 required</span>
          </div>

          <form id="abgForm" autocomplete="off">
            <section class="photo-section" aria-label="Photo input">
              <div class="section-title">
                <h3>Photo Input</h3>
                <span class="status-pill" id="ocrStatus">No photo</span>
              </div>
              <div class="photo-grid">
                <label class="photo-drop">
                  <input id="photoInput" type="file" accept="image/*" capture="environment">
                  <span>Take or upload ABG photo</span>
                  <small>Good light, flat page, include units where possible.</small>
                </label>
                <div class="photo-preview" id="photoPreview">
                  <span>No image selected</span>
                </div>
              </div>
              <div class="photo-actions">
                <button class="ghost-button" id="readPhoto" type="button">Read Photo</button>
                <button class="ghost-button" id="parseText" type="button">Use Text</button>
                <button class="ghost-button" id="clearPhoto" type="button">Clear Photo</button>
              </div>
              <textarea id="ocrText" rows="5" placeholder="OCR text appears here. You can edit it, then press Use Text."></textarea>
              <div id="parsedSummary" class="parsed-summary"></div>
            </section>
            <div id="inputSections"></div>
            <div class="form-footer">
              <label class="field compact-field">
                <span>Lab AG upper limit</span>
                <input id="agUpperLimit" inputmode="decimal" type="number" step="0.1" value="12">
              </label>
              <label class="field compact-field">
                <span>Barometric pressure</span>
                <input id="barometricPressure" inputmode="decimal" type="number" step="1" value="760">
              </label>
              <label class="field compact-field">
                <span>Respiratory quotient</span>
                <input id="respiratoryQuotient" inputmode="decimal" type="number" step="0.01" value="0.8">
              </label>
            </div>
          </form>
        </section>

        <section class="report-panel" aria-label="ABG report">
          <div class="panel-head">
            <div>
              <h2>Interpretation</h2>
              <p id="reportTimestamp">Waiting for input</p>
            </div>
            <button class="ghost-button icon-button" id="copyJson" type="button" title="Copy structured JSON">JSON</button>
          </div>

          <div id="report" class="report-empty">
            <h3>Ready for analysis</h3>
            <p>Complete the required fields and run the rule engine.</p>
          </div>
        </section>
      </main>
    </div>

    <template id="fieldTemplate">
      <label class="field">
        <span class="field-label"></span>
        <div class="field-control">
          <input type="number" inputmode="decimal" step="any">
          <select></select>
        </div>
      </label>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="engine.js"></script>
    <script src="app.js"></script>
  </body>
</html>
