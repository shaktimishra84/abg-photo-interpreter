<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ABG Clinical Interpreter</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Social Media Preview -->
    <meta property="og:title" content="ABG Clinical Interpreter">
    <meta property="og:description" content="Rule-based clinical calculator for arterial blood gas analysis. Interpret pH, O2, CO2 and more.">
    <meta property="og:image" content="https://abg-clinical-interpreter.vercel.app/images/abg-social-preview.png">
    <meta property="og:url" content="https://abg-clinical-interpreter.vercel.app">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ABG Clinical Interpreter">
    <meta name="twitter:description" content="Rule-based clinical calculator for arterial blood gas analysis. Interpret pH, O2, CO2 and more.">
    <meta name="twitter:image" content="https://abg-clinical-interpreter.vercel.app/images/abg-social-preview.png">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Rule-based clinical calculator</p>
          <h1>ABG Interpreter</h1>
        </div>
        <div class="topbar-actions">
          <button class="ghost-button" id="loadExample" type="button" title="Load a mixed acidosis example">Example</button>
          <button class="ghost-button" id="resetForm" type="button" title="Clear all values">Reset</button>
          <button class="primary-button" id="runAnalysis" type="button">Analyze</button>
        </div>
      </header>

      <main class="workbench">
        <section class="input-panel" aria-label="ABG inputs">
          <div class="panel-head">
            <div>
              <h2>Capture and Values</h2>
              <p>Start with the image, then confirm the main ABG numbers.</p>
            </div>
            <span class="status-pill" id="completionStatus">0 core</span>
          </div>

          <form id="abgForm" autocomplete="off">
            <div class="tab-strip input-tabs" id="inputTabs" role="tablist" aria-label="Input groups">
              <button class="tab-button active" type="button" role="tab" aria-selected="true" data-input-tab="core">Core</button>
              <button class="tab-button" type="button" role="tab" aria-selected="false" data-input-tab="more">More values</button>
              <button class="tab-button" type="button" role="tab" aria-selected="false" data-input-tab="context">Context</button>
            </div>
            <div id="inputSections"></div>
            <div class="input-action-bar">
              <button class="primary-button" id="runAnalysisInline" type="button">Analyze</button>
            </div>
          </form>
        </section>

        <section class="report-panel" aria-label="ABG report">
          <div class="panel-head">
            <div>
              <h2>Interpretation</h2>
              <p id="reportTimestamp">Waiting for input</p>
            </div>
            <button class="ghost-button icon-button" id="copyJson" type="button" title="Copy structured JSON" aria-label="Copy structured JSON">JSON</button>
          </div>

          <div id="report" class="report-empty" aria-live="polite" aria-atomic="false">
            <h3>Ready for analysis</h3>
            <p>Enter pH, PaCO2, HCO3, and electrolytes to see the interpretation.</p>
          </div>
        </section>
      </main>
    </div>

    <template id="fieldTemplate">
      <label class="field">
        <span class="field-label"></span>
        <div class="field-control">
          <input type="number" inputmode="decimal" step="any">
          <select></select>
        </div>
      </label>
    </template>

    <script src="engine.js"></script>
    <script src="app.js"></script>
  </body>
</html>
